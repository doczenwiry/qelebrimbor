# See https://pre-commit.com for more information
# See pre-commit.com for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version tag (keep this updated to the latest release)
    rev: v0.15.2
    hooks:
      - id: ruff-format
      - id: ruff
        args: [ --fix ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: [
          "types-requests",
          "pydantic"
        ]